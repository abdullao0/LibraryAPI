

services:
  node-app:
    build: .
    ports:
      - "127.0.0.1:3000:3000" 
    restart: always
    env_file:
      - .env
    environment:
      DB_HOST: postgres
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro

volumes:
  postgres_data:
